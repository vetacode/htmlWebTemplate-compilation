<!-- HERO SECTION MODERN AOS -->
<!-- Include AOS + Tailwind -->
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

<section
  class="relative overflow-hidden bg-black text-white min-h-screen flex items-center"
>
  <!-- BACKGROUND -->
  <div class="absolute inset-0">
    <!-- VIDEO BACKGROUND -->
    <video
      autoplay
      muted
      loop
      playsinline
      class="w-full h-full object-cover opacity-30"
    >
      <source
        src="https://cdn.coverr.co/videos/coverr-working-on-a-computer-5176/1080p.mp4"
        type="video/mp4"
      />
    </video>

    <!-- DARK OVERLAY -->
    <div
      class="absolute inset-0 bg-gradient-to-br from-black via-black/80 to-black"
    ></div>

    <!-- GLOW -->
    <div
      class="absolute top-[-150px] left-[-150px] w-[500px] h-[500px] bg-cyan-500/20 blur-[120px] rounded-full"
    ></div>

    <div
      class="absolute bottom-[-150px] right-[-150px] w-[500px] h-[500px] bg-fuchsia-500/20 blur-[120px] rounded-full"
    ></div>
  </div>

  <!-- CONTENT -->
  <div
    class="relative z-10 max-w-7xl mx-auto px-6 lg:px-12 py-24 grid lg:grid-cols-2 gap-16 items-center"
  >
    <!-- LEFT -->
    <div>
      <!-- BADGE -->
      <div
        data-aos="fade-right"
        data-aos-duration="1200"
        class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 bg-white/5 backdrop-blur-md mb-8"
      >
        <span class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span>

        <span class="text-sm tracking-wider uppercase text-white/80">
          AI Powered Digital Agency
        </span>
      </div>

      <!-- TITLE -->
      <h1
        data-aos="fade-up"
        data-aos-delay="200"
        data-aos-duration="1400"
        class="text-5xl md:text-7xl font-black leading-[0.95] tracking-tight"
      >
        Build
        <span
          class="bg-gradient-to-r from-cyan-400 to-fuchsia-500 bg-clip-text text-transparent"
        >
          Future
        </span>

        Digital Experience
      </h1>

      <!-- DESCRIPTION -->
      <p
        data-aos="fade-up"
        data-aos-delay="400"
        data-aos-duration="1400"
        class="mt-8 text-lg md:text-xl text-white/70 leading-relaxed max-w-xl"
      >
        Modern landing page with cinematic visual, smooth motion, AI-powered
        strategy, and premium conversion-focused experience.
      </p>

      <!-- BUTTON -->
      <div
        data-aos="fade-up"
        data-aos-delay="600"
        data-aos-duration="1400"
        class="mt-10 flex flex-wrap gap-4"
      >
        <a
          href="#"
          class="px-8 py-4 rounded-2xl bg-gradient-to-r from-cyan-500 to-fuchsia-500 font-semibold shadow-2xl shadow-cyan-500/20 hover:scale-105 transition-all duration-300"
        >
          Get Started
        </a>

        <a
          href="#"
          class="px-8 py-4 rounded-2xl border border-white/10 bg-white/5 backdrop-blur-md hover:bg-white/10 transition-all duration-300"
        >
          View Portfolio
        </a>
      </div>

      <!-- STATS -->
      <div
        data-aos="fade-up"
        data-aos-delay="800"
        data-aos-duration="1400"
        class="mt-16 grid grid-cols-3 gap-6"
      >
        <div>
          <h3 class="text-3xl font-black">120+</h3>
          <p class="text-white/60 mt-1">Projects</p>
        </div>

        <div>
          <h3 class="text-3xl font-black">98%</h3>
          <p class="text-white/60 mt-1">Client Satisfaction</p>
        </div>

        <div>
          <h3 class="text-3xl font-black">24/7</h3>
          <p class="text-white/60 mt-1">AI Automation</p>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div
      data-aos="zoom-in"
      data-aos-delay="300"
      data-aos-duration="1800"
      class="relative"
    >
      <!-- GLASS CARD -->
      <div
        class="relative rounded-[40px] overflow-hidden border border-white/10 bg-white/5 backdrop-blur-xl shadow-2xl"
      >
        <img
          src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop"
          class="w-full h-[650px] object-cover opacity-90"
        />

        <!-- FLOATING CARD -->
        <div
          class="absolute bottom-6 left-6 right-6 p-6 rounded-3xl bg-black/50 backdrop-blur-xl border border-white/10"
        >
          <div class="flex items-center justify-between">
            <div>
              <p class="text-white/60 text-sm">AI Performance</p>
              <h3 class="text-3xl font-black mt-1">+320%</h3>
            </div>

            <div
              class="w-14 h-14 rounded-2xl bg-gradient-to-r from-cyan-400 to-fuchsia-500 flex items-center justify-center text-2xl"
            >
              🚀
            </div>
          </div>
        </div>
      </div>

      <!-- FLOATING BLUR -->
      <div
        class="absolute -top-10 -right-10 w-40 h-40 bg-cyan-500/30 blur-[100px] rounded-full"
      ></div>
    </div>
  </div>
</section>

<!-- AOS SCRIPT -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
  AOS.init({
    once: true,
    offset: 100,
  });
</script>
