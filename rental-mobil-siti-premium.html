<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siti Maemunah</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="content mt-4">
        <!doctype html>
        <html lang="id">
          <head>
            <meta charset="UTF-8" />
            <meta
              name="viewport"
              content="width=device-width, initial-scale=1.0"
            />
            <title>Brodocar PRO</title>
            <link
              rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
            />
            <style>
              :root {
                --merah: #e53935;
                --hijau: #43a047;
                --kuning: #fdd835;
                --bg: #fff;
                --text: #000;
              }

              body.dark {
                --bg: #121212;
                --text: #fff;
              }

              body {
                margin: 0;
                font-family: Arial;
                background: var(--bg);
                color: var(--text);
              }

              img {
                width: 100%;
                border-radius: 12px;
                box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
                height: 300px;
              }

              /* NAVBAR */
              .navbar {
                display: flex;
                justify-content: space-between;
                padding: 15px;
                background: var(--merah);
                color: white;
                position: sticky;
                top: 0;
                z-index: 999;
              }

              .menu {
                display: flex;
              }

              .menu a {
                margin-left: 15px;
                color: white;
                text-decoration: none;
              }

              .menu a:hover {
                animation: blink 0.5s infinite;
              }

              @keyframes blink {
                50% {
                  opacity: 0.3;
                }
              }

              /* HERO SLIDER */
              .hero {
                position: relative;
                height: 300px;
                overflow: hidden;
              }

              .hero img {
                position: absolute;
                width: 100%;
                height: 100%;
                object-fit: cover;
                opacity: 0;
                transition: 1s;
              }

              .hero img.active {
                opacity: 1;
              }

              .hero-text {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: white;
                text-align: center;
              }

              /* GRID */
              .section {
                padding: 40px 20px;
              }

              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
              }

              .card {
                padding: 10px;
                background: var(--bg);
                border-radius: 12px;
              }

              .btn {
                display: inline-block;
                margin-top: 10px;
                padding: 10px;
                background: var(--hijau);
                color: white;
                text-decoration: none;
                border-radius: 8px;
              }

              /* TESTIMONI AUTO SLIDE */
              .testimoni {
                display: flex;
                gap: 20px;
                overflow: hidden;
              }

              .testimoni-track {
                display: flex;
                gap: 20px;
                animation: slide 10s linear infinite;
              }

              @keyframes slide {
                0% {
                  transform: translateX(0);
                }
                100% {
                  transform: translateX(-50%);
                }
              }

              .testimoni div {
                min-width: 250px;
              }

              /* WA */
              .wa {
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: #25d366;
                padding: 15px;
                border-radius: 50%;
                color: white;
              }

              /* FOOTER */
              footer {
                background: #222;
                color: white;
                padding: 40px 20px;
              }

              .footer-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
              }

              /* MOBILE MENU */
              .toggle {
                display: none;
                cursor: pointer;
              }

              @media (max-width: 768px) {
                .menu {
                  display: none;
                  flex-direction: column;
                }
                .menu.active {
                  display: flex;
                }
                .toggle {
                  display: block;
                }
              }
            </style>
          </head>
          <body>
            <!-- NAVBAR -->
            <div class="navbar">
              <b>Brodocar</b>
              <div class="toggle" onclick="toggleMenu()">
                <i class="fa fa-bars"></i>
              </div>
              <div class="menu" id="menu">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Galeri</a>
                <a href="#">FAQ</a>
                <a href="#">Kontak</a>
              </div>
            </div>
            <!-- HERO SLIDER -->
            <div class="hero">
              <img
                src="https://images.unsplash.com/photo-1709072245760-ec5b9a6b9f9b?q=80&w=1887&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                class="active"
              />
              <img
                src="https://images.unsplash.com/photo-1771248647341-9d8f567b051d?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              />
              <img
                src="https://images.unsplash.com/photo-1622791905066-0fe6af17ad80?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              />
              <div class="hero-text">
                <h1>Brodocar Premium</h1>
                <p>Sewa mobil terbaik</p>
              </div>
            </div>
            <!-- MOBIL -->
            <div class="section">
              <h2>Unit Mobil</h2>
              <div class="grid">
                <!-- CARD -->
                <div class="card">
                  <img
                    src="https://images.unsplash.com/photo-1558101847-e017d5e414a4?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                  />
                  <h3>Alphard</h3>
                  <a href="#" class="btn">Booking</a>
                </div>

                <div class="card">
                  <img
                    src="https://images.unsplash.com/photo-1594978100646-ccd2ae32b711?q=80&w=1351&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                  />
                  <h3>Pajero</h3>
                  <a href="#" class="btn">Booking</a>
                </div>
              </div>
            </div>
            <!-- TESTIMONI -->
            <div class="section">
              <h2>Testimoni</h2>
              <div class="testimoni">
                <div class="testimoni-track">
                  <div>
                    <img src="https://source.unsplash.com/200x200/?person" />
                    <p>"Mantap"</p>
                  </div>

                  <div>
                    <img src="https://source.unsplash.com/200x200/?man" />
                    <p>"Cepat"</p>
                  </div>

                  <div>
                    <img src="https://source.unsplash.com/200x200/?woman" />
                    <p>"Nyaman"</p>
                  </div>
                </div>
              </div>
            </div>
            <!-- FOOTER -->
            <footer>
              <div class="footer-grid">
                <div>
                  <h3>Brodocar</h3>
                  <p>Rental mobil terbaik</p>
                </div>
                <div>
                  <h3>Menu</h3>
                  <p>Home</p>
                  <p>Galeri</p>
                </div>
                <div>
                  <h3>Kontak</h3>
                  <p>08123456789</p>
                </div>
              </div>
            </footer>
            <!-- WA --><a href="https://wa.me/628123456789" class="wa">
              <i class="fab fa-whatsapp"></i>
            </a>
            <script>
              // DARK MODE AUTO
              if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.classList.add('dark');
              }

              // MENU MOBILE
              function toggleMenu() {
                document.getElementById('menu').classList.toggle('active');
              }

              // HERO SLIDER AUTO
              let slides = document.querySelectorAll('.hero img');
              let index = 0;
              setInterval(() => {
                slides[index].classList.remove('active');
                index = (index + 1) % slides.length;
                slides[index].classList.add('active');
              }, 3000);
            </script>
          </body>
        </html>
      </div>
    </div>
  </body>
</html>
